<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录验证 - SUNGBLY ACCOUNT V6</title>
    <style>
        :root {
            --bg-color: #e3f2fd;
            --primary-color: #1976D2;
            --text-primary: #333;
            --text-secondary: #666;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            background: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(25, 118, 210, 0.2);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .title {
            font-size: 24px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .success-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 20px;
            display: none;
            background: rgba(16, 185, 129, 0.2);
            border-radius: 50%;
            padding: 8px;
            animation: successPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .success-icon.show {
            display: block;
        }

        .success-icon svg {
            width: 100%;
            height: 100%;
            fill: none;
            stroke: #10b981;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        @keyframes successPop {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner" id="spinner"></div>
        <svg class="success-icon" id="successIcon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
        <div class="title" id="title">验证中...</div>
        <div class="subtitle" id="subtitle">正在处理您的登录请求</div>
    </div>

    <script>
        function getUrlParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        function setCookie(name, value, days = 30) {
            const expires = new Date();
            expires.setTime(expires.getTime() + (days * 24 * 60 * 60 * 1000));
            document.cookie = name + '=' + encodeURIComponent(value) + ';expires=' + expires.toUTCString() + ';path=/';
        }

        function getQuickLoginAccounts() {
            const accountsStr = getCookie('quickLoginAccounts');
            if (accountsStr) {
                try {
                    return JSON.parse(decodeURIComponent(accountsStr));
                } catch (e) {
                    return [];
                }
            }
            return [];
        }

        function saveQuickLoginAccount(account) {
            let accounts = getQuickLoginAccounts();
            const existingIndex = accounts.findIndex(a => a.uid === account.uid);
            if (existingIndex !== -1) {
                accounts[existingIndex] = account;
            } else {
                accounts.unshift(account);
            }
            if (accounts.length > 10) {
                accounts = accounts.slice(0, 10);
            }
            const expires = new Date();
            expires.setTime(expires.getTime() + (365 * 24 * 60 * 60 * 1000));
            document.cookie = 'quickLoginAccounts=' + encodeURIComponent(JSON.stringify(accounts)) + ';expires=' + expires.toUTCString() + ';path=/';
        }

        async function processLogin() {
            const certParam = getUrlParam('cert');
            
            if (!certParam) {
                document.getElementById('title').textContent = '错误';
                document.getElementById('subtitle').textContent = '未找到证书参数';
                document.getElementById('spinner').style.display = 'none';
                setTimeout(() => {
                    window.location.href = '../index.html';
                }, 2000);
                return;
            }

            try {
                const certText = new TextDecoder().decode(Uint8Array.from(atob(certParam), c => c.charCodeAt(0)));
                const cert = JSON.parse(certText);

                if (cert.more && cert.more.controlToken) {
                    setCookie('controlKey', cert.more.controlToken, 30);
                    setCookie('userName', cert.name, 30);
                    setCookie('userUid', cert.uid, 30);
                    if (cert.more.email) {
                        setCookie('userEmail', cert.more.email, 30);
                    }
                    
                    saveQuickLoginAccount({
                        uid: cert.uid,
                        name: cert.name,
                        email: cert.more.email || '',
                        controlToken: cert.more.controlToken,
                        certVersion: cert.certVersion,
                        sign: cert.sign,
                        appID: cert.appID,
                        more: cert.more
                    });
                    
                    document.getElementById('spinner').style.display = 'none';
                    document.getElementById('successIcon').classList.add('show');
                    document.getElementById('title').textContent = '验证成功';
                    document.getElementById('subtitle').textContent = '即将跳转到主页...';

                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);
                } else {
                    document.getElementById('title').textContent = '错误';
                    document.getElementById('subtitle').textContent = '证书中未找到 controlToken';
                    document.getElementById('spinner').style.display = 'none';
                    setTimeout(() => {
                        window.location.href = '../index.html';
                    }, 2000);
                }
            } catch (error) {
                console.error('Error processing certificate:', error);
                document.getElementById('title').textContent = '错误';
                document.getElementById('subtitle').textContent = '证书解析失败';
                document.getElementById('spinner').style.display = 'none';
                setTimeout(() => {
                    window.location.href = '../index.html';
                }, 2000);
            }
        }

        window.onload = processLogin;
    </script>
</body>
</html>
